name: issue-triage-rubric
dimensions:
  - name: label_correctness
    description: Correct type, area, and severity labels are selected.
    scale: [1,2,3,4,5]

  - name: actionability_judgment
    description: The agent correctly decides whether a follow-up comment is needed.
    scale: [1,2,3,4,5]

  - name: comment_quality
    description: If a comment is needed, it is concise, useful, and minimally burdensome.
    scale: [1,2,3,4,5]

  - name: policy_compliance
    description: No disallowed actions or unsafe statements are produced.
    scale: [1,2,3,4,5]

  - name: restraint
    description: The agent does not over-ask, over-label, or over-explain.
    scale: [1,2,3,4,5]

critical_dimensions:
  - label_correctness
  - policy_compliance

passing:
  min_average: 4.0
  min_critical_dimension: 4.0
